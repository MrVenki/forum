<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="main" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
  </defs>

  <!-- Right wing building -->
  <rect x="31" y="17" width="11" height="27" rx="1" fill="url(#side)"/>
  <!-- Right wing windows -->
  <rect x="33" y="21" width="3" height="2.5" rx="0.4" fill="white" opacity="0.55"/>
  <rect x="37" y="21" width="3" height="2.5" rx="0.4" fill="white" opacity="0.55"/>
  <rect x="33" y="27" width="3" height="2.5" rx="0.4" fill="white" opacity="0.5"/>
  <rect x="37" y="27" width="3" height="2.5" rx="0.4" fill="white" opacity="0.5"/>
  <rect x="33" y="33" width="3" height="2.5" rx="0.4" fill="white" opacity="0.45"/>
  <rect x="37" y="33" width="3" height="2.5" rx="0.4" fill="white" opacity="0.45"/>

  <!-- Left wing building -->
  <rect x="6" y="20" width="11" height="24" rx="1" fill="url(#side)"/>
  <!-- Left wing windows -->
  <rect x="8" y="24" width="3" height="2.5" rx="0.4" fill="white" opacity="0.55"/>
  <rect x="12" y="24" width="3" height="2.5" rx="0.4" fill="white" opacity="0.55"/>
  <rect x="8" y="30" width="3" height="2.5" rx="0.4" fill="white" opacity="0.5"/>
  <rect x="12" y="30" width="3" height="2.5" rx="0.4" fill="white" opacity="0.5"/>
  <rect x="8" y="36" width="3" height="2.5" rx="0.4" fill="white" opacity="0.45"/>
  <rect x="12" y="36" width="3" height="2.5" rx="0.4" fill="white" opacity="0.45"/>

  <!-- Center main tower -->
  <rect x="15" y="7" width="18" height="37" rx="1.5" fill="url(#main)"/>

  <!-- Dome / arch at top of center tower -->
  <ellipse cx="24" cy="8" rx="7" ry="5" fill="#FB923C"/>
  <ellipse cx="24" cy="7" rx="4" ry="3" fill="#FED7AA" opacity="0.35"/>

  <!-- Center tower windows — column 1 -->
  <rect x="17" y="14" width="3.5" height="3" rx="0.5" fill="white" opacity="0.65"/>
  <rect x="17" y="20" width="3.5" height="3" rx="0.5" fill="white" opacity="0.6"/>
  <rect x="17" y="26" width="3.5" height="3" rx="0.5" fill="white" opacity="0.55"/>
  <rect x="17" y="32" width="3.5" height="3" rx="0.5" fill="white" opacity="0.5"/>

  <!-- Center tower windows — column 2 -->
  <rect x="22.5" y="14" width="3.5" height="3" rx="0.5" fill="white" opacity="0.65"/>
  <rect x="22.5" y="20" width="3.5" height="3" rx="0.5" fill="white" opacity="0.6"/>
  <rect x="22.5" y="26" width="3.5" height="3" rx="0.5" fill="white" opacity="0.55"/>
  <rect x="22.5" y="32" width="3.5" height="3" rx="0.5" fill="white" opacity="0.5"/>

  <!-- Center tower windows — column 3 -->
  <rect x="28" y="14" width="3.5" height="3" rx="0.5" fill="white" opacity="0.65"/>
  <rect x="28" y="20" width="3.5" height="3" rx="0.5" fill="white" opacity="0.6"/>
  <rect x="28" y="26" width="3.5" height="3" rx="0.5" fill="white" opacity="0.55"/>
  <rect x="28" y="32" width="3.5" height="3" rx="0.5" fill="white" opacity="0.5"/>

  <!-- Arched entrance gate at base -->
  <ellipse cx="24" cy="44" rx="5" ry="4" fill="#C2410C"/>
  <rect x="19" y="44" width="10" height="4" fill="#C2410C"/>
  <ellipse cx="24" cy="44" rx="3.5" ry="2.8" fill="#EA580C"/>

  <!-- Ground base line -->
  <rect x="4" y="44" width="40" height="2.5" rx="1.25" fill="#9A3412"/>
</svg>
